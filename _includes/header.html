<header class="site-header" role="banner">
  <div class="wrapper custom-header-wrapper">
    <a class="site-title custom-site-title" rel="author" href="{{ "/" | relative_url }}">
      <img
        src="{{ site.logo | relative_url }}"
        alt="Upkeep app icon"
        class="site-logo"
        width="34"
        height="34"
      >
      <span>{{ site.title | escape }}</span>
    </a>

    <nav class="site-nav" aria-label="Main navigation">
      <input type="checkbox" id="nav-trigger" class="nav-trigger" />

      <label for="nav-trigger" class="menu-icon" aria-label="Open navigation menu">
        <span></span>
        <span></span>
        <span></span>
      </label>

      <div class="trigger">
        <a class="page-link" href="{{ "/upkeep-privacy-policy" | relative_url }}">Privacy Policy</a>
        <a class="page-link" href="{{ "/upkeep-support" | relative_url }}">Support</a>
      </div>
    </nav>
  </div>
</header>
