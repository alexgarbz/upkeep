<header class="site-header" role="banner">
  <div class="wrapper custom-header-wrapper">
    <a class="site-title custom-site-title" rel="author" href="{{ "/" | relative_url }}">
      <img
        src="{{ site.logo | relative_url }}"
        alt="Upkeep app icon"
        class="site-logo"
        width="34"
        height="34"
      >
      <span>{{ site.title | escape }}</span>
    </a>

    <nav class="custom-nav">
      <a href="{{ "/upkeep-privacy-policy" | relative_url }}">Privacy Policy</a>
      <a href="{{ "/upkeep-support" | relative_url }}">Support</a>
    </nav>
  </div>
</header>
